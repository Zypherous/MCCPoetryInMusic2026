<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Poetry in Music Exhibition</title>
  <meta name="description" content="Poems by older adult artists transformed into music videos through AI-assisted song creation." />
  <link rel="preconnect" href="https://img.youtube.com">
  <link rel="preconnect" href="https://api.qrserver.com">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="kicker">Weinberg Center for Balanced Living</p>
      <h1>Poetry in Music</h1>
      <p class="intro">Explore poems by older adult artists, transformed into music videos through AI-assisted song creation.</p>
      <div class="toolbar" aria-label="Exhibit controls">
        <input id="search" type="search" placeholder="Search by title or artist" aria-label="Search by title or artist" />
        <button id="fullscreen" type="button">Kiosk fullscreen</button>
      </div>
    </div>
  </header>

  <main>
    <section id="grid" class="grid" aria-label="Poetry in Music pieces"></section>
  </main>

  <dialog id="qrDialog" class="qr-dialog" aria-labelledby="qrTitle">
    <button class="close" type="button" aria-label="Close QR dialog">×</button>
    <p class="kicker">Scan to listen</p>
    <img id="qrImage" alt="QR code for selected music video" />
    <h2 id="qrTitle"></h2>
    <p id="qrArtist" class="artist"></p>
    <a id="qrLink" class="btn primary" target="_blank" rel="noopener">Open video</a>
  </dialog>

  <dialog id="videoDialog" class="video-dialog" aria-labelledby="videoTitle">
  <button class="close video-close" type="button" aria-label="Close video">×</button>
  <div class="video-frame-wrap">
    <iframe
      id="videoFrame"
      title="Selected music video"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      allowfullscreen>
    </iframe>
  </div>
  <h2 id="videoTitle"></h2>
  <p id="videoArtist" class="artist"></p>
</dialog>
  
  <footer>
    <p>Created for the Poetry in Music exhibition. Headphones recommended.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
